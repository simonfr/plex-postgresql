name: Update Versions on Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  update-versions:
    name: Update version refs in wiki + READMEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # README version refs are updated manually before tagging.
      # The old auto-sed approach was fragile (broke on major version bumps).

      - name: Determine new version
        id: ver
        run: |
          set -eux
          NEW="$(cat VERSION)"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Clone wiki
        run: |
          set -eux
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Update version in Home.md
        run: |
          set -eux
          TAG="v${{ steps.ver.outputs.new }}"
          sed -i "s|## Latest release: v[0-9.]*|## Latest release: ${TAG}|" wiki/Home.md
          echo "Updated Home.md to ${TAG}"
          grep "Latest release" wiki/Home.md

      - name: Push wiki changes
        run: |
          set -eux
          cd wiki
          git diff --quiet && { echo "No wiki changes"; exit 0; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Home.md
          git commit -m "auto: update latest release to v$(cat ../VERSION)"
          git push
